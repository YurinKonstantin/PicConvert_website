<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // Получаем язык браузера (например, "ru-RU" или "en-US")
        var userLang = navigator.language || navigator.userLanguage; 
        userLang = userLang.toLowerCase();

        // Если язык русский, украинский, белорусский или казахский — отправляем на русскую версию
        if (userLang.startsWith('ru') || userLang.startsWith('uk') || userLang.startsWith('be') || userLang.startsWith('kk')) {
            window.location.href = "./ru/index.html";
        } else {
            // Для всех остальных стран — английская версия по умолчанию
            window.location.href = "./en/index.html";
        }
    </script>
</head>
<body>
    <p>If you are not redirected, <a href="./en/index.html">click here</a>.</p>
</body>
</html>
